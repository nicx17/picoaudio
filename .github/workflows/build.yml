name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential ninja-build

      - name: Checkout Pico SDK (Latest)
        uses: actions/checkout@v6
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk
          submodules: true

      - name: Checkout Pico Extras (Latest)
        uses: actions/checkout@v6
        with:
          repository: raspberrypi/pico-extras
          path: pico-extras
          submodules: true

      - name: Build Firmware
        run: |
          export PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk
          export PICO_EXTRAS_PATH=$GITHUB_WORKSPACE/pico-extras
          mkdir build && cd build
          cmake -GNinja -DPICO_BOARD=pico2_w -DCMAKE_BUILD_TYPE=Release ..
          ninja

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-audio-firmware
          path: |
            build/*.uf2
            build/*.elf
